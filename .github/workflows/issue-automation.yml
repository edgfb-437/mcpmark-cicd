name: Issue Management Automation

on:
  issues:
    types: [opened]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage issue and create required labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';

            // Define required labels with descriptions
            const requiredLabels = [
              { name: 'bug', description: 'Something isn\'t working' },
              { name: 'enhancement', description: 'New feature or request' },
              { name: 'epic', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', description: 'Maintenance and housekeeping tasks' },
              { name: 'priority-critical', description: 'Critical priority issue' },
              { name: 'priority-high', description: 'High priority issue' },
              { name: 'priority-medium', description: 'Medium priority issue' },
              { name: 'priority-low', description: 'Low priority issue' },
              { name: 'needs-triage', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', description: 'Issue created by first-time contributor' }
            ];

            // Create required labels if they don't exist
            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: issue.owner,
                  repo: issue.repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: issue.owner,
                    repo: issue.repo,
                    name: label.name,
                    description: label.description,
                    color: 'ffffff'
                  });
                }
              }
            }

            // Add initial needs-triage label
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['needs-triage']
            });

            // Assign category labels based on title
            const categoryLabels = [];
            if (title.includes('bug')) {
              categoryLabels.push('bug');
            }
            if (title.includes('epic')) {
              categoryLabels.push('epic');
            }
            if (title.includes('maintenance')) {
              categoryLabels.push('maintenance');
            }

            if (categoryLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: categoryLabels
              });
            }

            // Assign priority labels (highest priority first)
            let priorityLabel = 'priority-medium'; // Default priority
            const priorityRules = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' }
            ];

            for (const rule of priorityRules) {
              if (rule.keywords.some(keyword => title.includes(keyword) || body.includes(keyword))) {
                priorityLabel = rule.label;
                break;
              }
            }

            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: [priorityLabel]
            });

  task-breakdown:
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    runs-on: ubuntu-latest
    steps:
      - name: Create epic subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const parentTitle = issue.title;
            const parentNumber = issue.number;

            // Define subtask details
            const subtasks = [
              { name: 'Requirements Analysis' },
              { name: 'Design and Architecture' },
              { name: 'Implementation' },
              { name: 'Testing and Documentation' }
            ];

            // Create subtasks and collect their issue numbers
            const subtaskNumbers = [];
            for (let i = 0; i < subtasks.length; i++) {
              const task = subtasks[i];
              const subtaskTitle = `[SUBTASK] ${parentTitle} - Task ${i+1}: ${task.name}`;
              const subtaskBody = `Related to #${parentNumber}`;

              // Create subtask
              const response = await github.rest.issues.create({
                owner: issue.owner,
                repo: issue.repo,
                title: subtaskTitle,
                body: subtaskBody,
                labels: ['enhancement', 'needs-review']
              });

              subtaskNumbers.push(response.data.number);
            }

            // Update parent issue with epic tasks checklist
            const existingBody = issue.body || '';
            const checklist = `## Epic Tasks\n${subtaskNumbers.map(num => `- [ ] #${num}`).join('\n')}`;
            const updatedBody = existingBody + '\n\n' + checklist;

            await github.rest.issues.update({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: parentNumber,
              body: updatedBody
            });

  auto-response:
    needs: issue-triage
    runs-on: ubuntu-latest
    steps:
      - name: Auto respond to issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const author = issue.user.login;
            const issueLabels = issue.labels.map(label => label.name);

            // Check if this is the author's first issue in the repository
            const authorIssues = await github.rest.issues.listForRepo({
              owner: issue.owner,
              repo: issue.repo,
              creator: author,
              state: 'all'
            });
            const isFirstIssue = authorIssues.data.length === 1;

            // Add first-time-contributor label if applicable
            if (isFirstIssue) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: ['first-time-contributor']
              });
            }

            // Generate type-specific response
            let responseContent = '';
            if (issueLabels.includes('bug')) {
              responseContent = 'Thank you for reporting this bug! Please follow our [Bug Report Guidelines](.github/ISSUE_TEMPLATE/bug_report.md) to help us resolve this issue quickly.';
            } else if (issueLabels.includes('epic')) {
              responseContent = 'Thank you for submitting this epic! Please follow our [Feature Request Process](.github/ISSUE_TEMPLATE/feature_request.md) as we work through this large feature.';
            } else if (issueLabels.includes('maintenance')) {
              responseContent = 'Thank you for submitting this maintenance task! Please follow our [Maintenance Guidelines](.github/ISSUE_TEMPLATE/maintenance_report.md) to help us complete this task efficiently.';
            } else {
              responseContent = 'Thank you for submitting this issue! We will review it shortly.';
            }

            // Add welcome message for first-time contributors
            if (isFirstIssue) {
              responseContent = `Welcome to the repository, @${author}! This is your first issue here. ${responseContent}`;
            }

            // Post the response comment
            await github.rest.issues.createComment({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              body: responseContent
            });

            // Set milestone for high/critical priority issues
            if (issueLabels.includes('priority-high') || issueLabels.includes('priority-critical')) {
              // Check if v1.0.0 milestone exists, create if not
              let milestone = await github.rest.issues.listMilestones({
                owner: issue.owner,
                repo: issue.repo,
                state: 'open',
                per_page: 100
              }).then(res => res.data.find(m => m.title === 'v1.0.0'));

              if (!milestone) {
                milestone = await github.rest.issues.createMilestone({
                  owner: issue.owner,
                  repo: issue.repo,
                  title: 'v1.0.0'
                }).then(res => res.data);
              }

              await github.rest.issues.update({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                milestone: milestone.number
              });
            }

            // Update status from needs-triage to needs-review
            await github.rest.issues.removeLabel({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              name: 'needs-triage'
            });

            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['needs-review']
            });